name: ManyVidsStashDB
description: Scrape ManyVids and match against local Stash. Adds a ManyVids button to scene pages.
version: "0.1.4"

exec:
  - python
  - "{pluginDir}/ManyVidsStashDB.py"

interface: raw

ui:
  javascript:
    - ManyVidsStashDB.js
  css:
    - ManyVidsStashDB.css

settings:
  proxyUrl:
    displayName: Outbound Proxy URL (optional)
    description: >
      HTTP/HTTPS proxy for outbound requests to manyvids.com, e.g.
      http://your-stash-host-ip:8888. Leave blank to scrape directly with no
      proxy. Not required in testing so far (no blocking observed), kept
      for parity/future-proofing in case ManyVids starts IP-blocking this
      server.
    type: STRING

tasks:
  - name: "Test Config Roundtrip"
    description: Internal check -- writes and reads back a dummy performerStoreMap entry to verify config plumbing. Safe to run any time.
    defaultArgs:
      mode: test_config

  - name: "Parse Filename"
    description: Parses a local filename into a candidate performer name and clip title. Pass 'filename' as an arg.
    defaultArgs:
      mode: parse_filename

  - name: "Match Performer Store"
    description: Looks up a performer name against known stores (performerStoreMap only -- ManyVids has no public performer directory to fuzzy-match against, unlike IWantClips' sitemap). Pass 'performer_name' as an arg.
    defaultArgs:
      mode: match_performer

  - name: "Match Clips"
    description: Fetches a confirmed store's full clip catalog (paginated, both the main and vertical-video listings) and fuzzy-matches clip titles against a query. Pass 'profile_id' and 'query_text' as args.
    defaultArgs:
      mode: match_clips

  - name: "Scrape Clip"
    description: Scrapes one clip page's JSON-LD and resolves performers/studio against local Stash. Pass 'url' and 'studio_name' as args.
    defaultArgs:
      mode: scrape_clip
